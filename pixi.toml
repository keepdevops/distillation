[workspace]
authors = ["keepdevops <username@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "distill"
platforms = ["osx-arm64"]
version = "0.1.0"

[activation.env]
KMP_DUPLICATE_LIB_OK = "TRUE"

[tasks]

[pypi-dependencies]
distill = { path = ".", editable = true }
gradio = ">=6.0"
vllm-mlx = ">=0.2.1, <0.3"
peft = ">=0.14.0"
trl = ">=0.12.0"

[dependencies]
python = "<3.14"
numpy = ">=2.4.3,<3"
pip = ">=26.0.1,<27"
typing_extensions = ">=4.15.0,<5"
filelock = ">=3.25.2,<4"
fsspec = ">=2026.2.0,<2027"
matplotlib = ">=3.10.8,<4"
networkx = ">=3.6.1,<4"
sympy = ">=1.14.0,<2"
pytorch = ">=2.10.0,<3"
torchvision = ">=0.25.0,<0.26"
